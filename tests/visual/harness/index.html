<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>AuraLyrics Visual Harness</title>
	</head>
	<body>
		<div id="aura-lyrics-root" class="is-playing">
			<img
				class="pip-cover"
				alt=""
				src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 900 900'%3E%3Crect width='900' height='900' fill='%23132123'/%3E%3Ccircle cx='450' cy='430' r='250' fill='%232b7378'/%3E%3Ccircle cx='300' cy='310' r='145' fill='%23f5c15f'/%3E%3Ccircle cx='590' cy='580' r='165' fill='%23d94f70'/%3E%3Cpath d='M150 680 C330 540 520 800 750 630' stroke='%23f8f6ed' stroke-width='48' fill='none' stroke-linecap='round'/%3E%3C/svg%3E"
			/>

			<div class="pip-vignette"></div>
			<div class="pip-border-frame">
				<div class="pip-frame-surface">
					<div class="pip-frame-inner-shadow"></div>
					<div class="pip-frame-progress">

						<div class="pip-frame-progress-segment pip-frame-progress-right"></div>
						<div class="pip-frame-progress-segment pip-frame-progress-bottom"></div>
						<div class="pip-frame-progress-segment pip-frame-progress-left"></div>
					</div>
				</div>
			</div>
			<main id="aura-visual-root" class="pip-content"></main>
		</div>
		<script type="module" src="/main.ts"></script>
