<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>AuraLyrics Visual Harness</title>
	</head>
	<body>
		<div id="aura-lyrics-root" class="is-playing">
			<img
				class="pip-cover"
				alt=""
				src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 900 900'%3E%3Crect width='900' height='900' fill='%23132123'/%3E%3Ccircle cx='450' cy='430' r='250' fill='%232b7378'/%3E%3Ccircle cx='300' cy='310' r='145' fill='%23f5c15f'/%3E%3Ccircle cx='590' cy='580' r='165' fill='%23d94f70'/%3E%3Cpath d='M150 680 C330 540 520 800 750 630' stroke='%23f8f6ed' stroke-width='48' fill='none' stroke-linecap='round'/%3E%3C/svg%3E"
			/>
			<div class="pip-scrim"></div>
			<div class="pip-vignette"></div>
			<div class="pip-border-frame">
				<div class="pip-frame-surface">
					<div class="pip-frame-inner-shadow"></div>
					<div class="pip-frame-progress">
						<div class="pip-frame-progress-segment pip-frame-progress-top"></div>
						<div class="pip-frame-progress-segment pip-frame-progress-right"></div>
						<div class="pip-frame-progress-segment pip-frame-progress-bottom"></div>
						<div class="pip-frame-progress-segment pip-frame-progress-left"></div>
					</div>
				</div>
			</div>
			<main id="aura-visual-root" class="pip-content"></main>
			<button class="pip-close" type="button" aria-label="Close">
				<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7.05 7.05 12 12m0 0 4.95 4.95M12 12l4.95-4.95M12 12l-4.95 4.95" /></svg>
			</button>
			<div class="pip-controls chrome-pip-controls">
				<button type="button" data-control="previous" aria-label="Previous track">
					<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 6 5 12l6 6V6Zm8 0-6 6 6 6V6Z" /></svg>
				</button>
				<button type="button" data-control="toggle-play" aria-label="Pause">
					<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 6h3v12H8V6Zm5 0h3v12h-3V6Z" /></svg>
				</button>
				<button type="button" data-control="next" aria-label="Next track">
					<svg viewBox="0 0 24 24" aria-hidden="true"><path d="m13 6 6 6-6 6V6ZM5 6l6 6-6 6V6Z" /></svg>
				</button>
			</div>
		</div>
		<script type="module" src="/main.ts"></script>
	</body>
</html>
